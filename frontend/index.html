<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ZYRO INFINITY | VISION CORE</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;500;800&display=swap" rel="stylesheet">
  <style>
    :root { --primary: #0071e3; --bg: #ffffff; --text: #1d1d1f; --card: #f5f5f7; --border: #d2d2d7; }
    * { box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; transition: 0.3s; }
    body { margin: 0; background: var(--bg); color: var(--text); display: flex; height: 100vh; overflow: hidden; }

    .sidebar { width: 300px; background: var(--card); border-right: 1px solid var(--border); display: none; flex-direction: column; padding: 40px 25px; }
    .viewport { flex: 1; overflow-y: auto; padding: 60px 40px; display: flex; flex-direction: column; align-items: center; }
    .main-frame { width: 100%; max-width: 700px; text-align: center; }
    
    /* LOGIN FORM STYLE */
    #auth-section { background: var(--card); padding: 30px; border-radius: 25px; margin-bottom: 40px; border: 1px solid var(--border); }
    .login-input { padding: 15px; border-radius: 12px; border: 1px solid var(--border); width: 250px; margin-bottom: 10px; outline: none; }
    .btn-login { padding: 15px 30px; border-radius: 12px; background: var(--primary); color: white; border: none; font-weight: 800; cursor: pointer; }

    /* පරණ Styles ඔක්කොම එහෙම්මම තියන්න... */
    .history-list { flex: 1; overflow-y: auto; margin-top: 20px; }
    .history-item { padding: 12px; border-radius: 12px; background: white; border: 1px solid var(--border); margin-bottom: 8px; cursor: pointer; font-size: 11px; }
    .logo-box { width: 50px; height: 50px; border: 2.5px solid var(--text); border-radius: 14px; margin: 0 auto 20px; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 20px; }
    h1 { font-size: 11px; letter-spacing: 10px; text-transform: uppercase; margin-bottom: 50px; opacity: 0.6; }
    .upload-container { width: 100%; background: var(--card); border: 2px dashed var(--border); border-radius: 25px; padding: 30px; margin-bottom: 30px; cursor: pointer; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; text-align: left; }
    .full { grid-column: span 2; }
    input, select, textarea { width: 100%; background: var(--card); border: 1px solid var(--border); padding: 18px; border-radius: 16px; margin-top: 5px; }
    .btn-main { width: 100%; padding: 22px; border-radius: 20px; background: var(--text); color: white; font-weight: 800; border: none; cursor: pointer; margin-top: 20px; }
    .result-card { margin-top: 50px; background: var(--card); border: 1px solid var(--border); border-radius: 35px; padding: 40px; display: none; }
  </style>
</head>
<body>

<div class="sidebar" id="sidebar">
    <div style="font-size: 10px; font-weight: 800; letter-spacing: 4px; color: #bbb; margin-bottom: 30px;">ARCHIVE //</div>
    <div id="savedItems" class="history-list"></div>
    <div style="font-size:10px; color:red; cursor:pointer; font-weight:800; margin-top: 20px;" onclick="logout()">LOGOUT //</div>
</div>

<div class="viewport">
    <div class="main-frame">
        <div class="logo-box">Z</div>
        <h1>INFINITY VISION</h1>

        <div id="auth-section">
            <h2 style="font-size: 14px; margin-bottom: 15px;">LOGIN WITH EMAIL TO START 🚀</h2>
            <input type="email" id="email-in" class="login-input" placeholder="your@email.com"><br>
            <button class="btn-login" onclick="login()">SEND MAGIC LINK</button>
        </div>

        <div id="app-content" style="display: none;">
            <div class="upload-container" onclick="document.getElementById('fileIn').click()">
                <span id="upText">📸 CLICK TO UPLOAD PRODUCT PHOTO</span>
                <input type="file" id="fileIn" hidden accept="image/*" onchange="handleFile(event)">
            </div>
            <div class="grid">
                <div class="full"><input id="brand" placeholder="Brand Name"></div>
                <div class="full"><textarea id="topic" placeholder="Objective"></textarea></div>
                <select id="platform"><option>Instagram</option><option>Facebook</option></select>
                <select id="theme"><option>Luxury</option><option>Minimal</option></select>
                <select id="lang_select"><option value="sinhala">සිංහල</option><option value="english">English</option></select>
            </div>
            <button class="btn-main" onclick="initiateSynthesis()">🚀 START AI SYNTHESIS</button>
        </div>
    </div>
</div>

<script>
  const SUPABASE_URL = "https://trkjxdeeozepzsadvtaq.supabase.co";
  const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRya2p4ZGVlb3plcHpzYWR2dGFxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUxMDg0NTYsImV4cCI6MjA5MDY4NDQ1Nn0.mtTAozAr-d02INb4TG1ll-sdOhn5J-s2s0Z9nnNQFHc";
  const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  async function login() {
    const email = document.getElementById('email-in').value;
    const { error } = await supabaseClient.auth.signInWithOtp({ email });
    if (error) alert(error.message);
    else alert("Check your email for the login link!");
  }

  async function logout() { await supabaseClient.auth.signOut(); location.reload(); }

  async function check() {
    const { data } = await supabaseClient.auth.getUser();
    if (data?.user) {
      document.getElementById("auth-section").style.display = "none";
      document.getElementById("app-content").style.display = "block";
      document.getElementById("sidebar").style.display = "flex";
      loadHistory();
    }
  }

  async function loadHistory() {
    const { data } = await supabaseClient.from("posts").select("*").order("created_at", { ascending: false });
    let h = "";
    data?.forEach(p => { h += `<div class="history-item">${p.caption.substring(0,30)}...</div>`; });
    document.getElementById("savedItems").innerHTML = h || "Archive Empty";
  }

  check();
</script>
</body>
</html>
